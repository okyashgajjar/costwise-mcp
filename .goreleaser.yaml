version: 2

project_name: costwise

before:
  hooks:
    - go mod tidy

builds:
  - id: costwise
    main: ./cmd/costwise
    binary: costwise
    env:
      - CGO_ENABLED=1
      - CC=gcc
    goos:
      - linux
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/okyashgajjar/costwise-mcp/cmd.version={{ .Version }}
      - -X github.com/okyashgajjar/costwise-mcp/cmd.commit={{ .Commit }}
      - -X github.com/okyashgajjar/costwise-mcp/cmd.date={{ .Date }}
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    overrides:
      - goos: windows
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=x86_64-w64-mingw32-gcc

archives:
  - formats: ["zip"]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ .Version }}-SNAPSHOT-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore"
      - Merge pull request
      - Merge branch

release:
  prerelease: auto
